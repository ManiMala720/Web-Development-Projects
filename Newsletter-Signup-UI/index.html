<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Signup UI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
  integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="container">
    <div class="newsletter-container">
      <div class="icon-container">
        <i class="far fa-envelope-open"></i>
      </div>
      <h2>Join Our Newsletter</h2>
      <p>Get the latest updates and coding tips straight to your inbox</p>
      <form>
        <div class="input-groups">
          <i class="far fa-envelope"></i>
          <input type="email" required placeholder="Enter yout email">
        </div> 
        <button>Subscribe<i class="fas fa-arrow-right"></i></button>
      </form>
      <div class="subscription">
        <p class="subscription-items">
          <i class="fas fa-check"></i>Weekly coding tips
        </p>
        <p class="subscription-items">
          <i class="fas fa-check"></i>No spam, unsubscribe anytime.
        </p>
      </div>
    </div>
  </div>
</body>
</html>
